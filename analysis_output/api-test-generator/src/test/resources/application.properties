# API base URL — override with -Dapi.base.url=<url> or API_BASE_URL env var
api.base.url=http://localhost:8080

# Path prefix for all calculator endpoints
api.path=/api/v1

# Maximum acceptable response time in milliseconds
api.response.timeout.ms=2000

# Set to false to suppress per-request logging in passing tests
api.logging.enabled=true
