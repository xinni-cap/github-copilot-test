<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator 🧮</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 1.75rem; margin-bottom: .25rem; }
    .caption { color: #666; font-size: .9rem; margin-bottom: 1.5rem; }

    .row { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .col { flex: 1; display: flex; flex-direction: column; gap: .4rem; }

    label { font-size: .85rem; font-weight: 600; color: #444; }

    input[type="number"], select {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    input[type="number"]:focus, select:focus { border-color: #4f8ef7; }

    .select-wrap { margin-bottom: 1.25rem; }

    button {
      width: 100%;
      padding: .65rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #3a77e0; }

    #result-box {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1rem;
      display: none;
    }

    .success {
      background: #e6f4ea;
      border: 1px solid #a8d5b0;
      color: #1e5c2e;
    }

    .error {
      background: #fdecea;
      border: 1px solid #f5b7b1;
      color: #8e1a0e;
    }

    details { margin-top: .75rem; font-size: .85rem; color: #555; }
    summary { cursor: pointer; font-weight: 600; margin-bottom: .5rem; }
    pre { background: #f7f7f7; border-radius: 6px; padding: .75rem; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧮 Simple Calculator</h1>
    <p class="caption">Perform quick arithmetic with a clean .NET Minimal API UI.</p>

    <form id="calc-form" novalidate>
      <div class="row">
        <div class="col">
          <label for="num1">First number</label>
          <input id="num1" type="number" step="any" value="0" required />
        </div>
        <div class="col">
          <label for="num2">Second number</label>
          <input id="num2" type="number" step="any" value="0" required />
        </div>
      </div>

      <div class="select-wrap">
        <label for="operation">Operation</label>
        <select id="operation">
          <option value="Add">Add</option>
          <option value="Subtract">Subtract</option>
          <option value="Multiply">Multiply</option>
          <option value="Divide">Divide</option>
        </select>
      </div>

      <button type="submit">Calculate</button>
    </form>

    <div id="result-box"></div>
  </div>

  <script>
    const form = document.getElementById('calc-form');
    const resultBox = document.getElementById('result-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const body = {
        firstNumber:  parseFloat(document.getElementById('num1').value),
        secondNumber: parseFloat(document.getElementById('num2').value),
        operation:    document.getElementById('operation').value
      };

      const response = await fetch('/api/calculate', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });

      resultBox.style.display = 'block';

      if (response.status === 400) {
        const err = await response.json();
        resultBox.className = 'error';
        resultBox.innerHTML = `<strong>Error:</strong> ${err.error ?? JSON.stringify(err)}`;
        return;
      }

      if (!response.ok) {
        resultBox.className = 'error';
        resultBox.innerHTML = '<strong>Unexpected error.</strong> Please try again.';
        return;
      }

      const data = await response.json();
      resultBox.className = 'success';
      resultBox.innerHTML = `
        <strong>Result:</strong> ${data.firstNumber} ${data.symbol} ${data.secondNumber} = <strong>${data.result}</strong>
        <details>
          <summary>Computation details</summary>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        </details>`;
    });
  </script>
</body>
</html>
