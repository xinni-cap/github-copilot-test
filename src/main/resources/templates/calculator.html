<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator 🧮</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        .caption { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .columns { display: flex; gap: 15px; }
        .columns .form-group { flex: 1; }
        button {
            background-color: #ff4b4b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background-color: #cc3333; }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            color: #721c24;
        }
        .details {
            background-color: #e9ecef;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        summary { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Simple Calculator 🧮</h1>
    <p class="caption">Perform quick arithmetic with a clean UI.</p>

    <form th:action="@{/calculate}" method="post">
        <div class="columns">
            <div class="form-group">
                <label for="firstNumber">First number</label>
                <input type="number" id="firstNumber" name="firstNumber" step="any"
                       th:value="${firstNumber != null ? firstNumber : 0}" required/>
            </div>
            <div class="form-group">
                <label for="secondNumber">Second number</label>
                <input type="number" id="secondNumber" name="secondNumber" step="any"
                       th:value="${secondNumber != null ? secondNumber : 0}" required/>
            </div>
        </div>

        <div class="form-group">
            <label for="operation">Operation</label>
            <select id="operation" name="operation">
                <option th:each="op : ${operations}"
                        th:value="${op}"
                        th:text="${op}"
                        th:selected="${op == selectedOperation}">
                </option>
            </select>
        </div>

        <button type="submit">Calculate</button>
    </form>

    <div th:if="${response != null}">
        <div th:if="${response.error}" class="error">
            ⚠️ <span th:text="${response.errorMessage}"></span>
        </div>
        <div th:unless="${response.error}" class="success">
            ✅ Result: <strong>
                <span th:text="${response.firstNumber}"></span>
                <span th:text="${response.symbol}"></span>
                <span th:text="${response.secondNumber}"></span>
                =
                <span th:text="${response.result}"></span>
            </strong>
            <details class="details">
                <summary>Computation details</summary>
                <pre th:text="'First number: ' + ${response.firstNumber}"></pre>
                <pre th:text="'Second number: ' + ${response.secondNumber}"></pre>
                <pre th:text="'Operation: ' + ${response.operation}"></pre>
                <pre th:text="'Result: ' + ${response.result}"></pre>
            </details>
        </div>
    </div>
</body>
</html>
